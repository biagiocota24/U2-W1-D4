<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Esempio di testo a rotazione</title>
    <meta
      name="description"
      content="Creazione di uno slogan con testo a rotazione sfruttando le animazioni CSS"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="frase.css" />
    <style>
      @keyframes scrollaParole {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }

        40% {
          opacity: 0;
          transform: translateY(-10px);
        }
        50% {
          opacity: 1;
          transform: translateY(0);
        }
        80% {
          opacity: 0;
          transform: translateY(10px);
        }

        100% {
          opacity: 0;
        }
      }
      span {
        position: relative;
      }
      span i {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        animation: scrollaParole 5s infinite;
      }
      span i:nth-of-type(1) {
        animation-delay: 0s;
      }
      span i:nth-of-type(2) {
        animation-delay: 4s;
      }
      span i:nth-of-type(3) {
        animation-delay: 8s;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="testoAlternato">
        <p>
          Realizziamo con cura, passione
          <br />
          attenzione, meticolosità, precisione
          <br />
          ed un pizzico di originalità
          <span class="parole">
            <i>interfacce web</i>
            <i>single page app</i>
            <i>app native</i>
          </span>
        </p>
      </div>
    </main>
    <script>
      const paroleAlternate = document.querySelectorAll("i");
      const span = document.querySelector("parole");
      let i = 0;
      const alternaPaola = function () {};
    </script>
  </body>
</html>
